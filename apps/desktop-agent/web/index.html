<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Bridge</title>
    <link rel="icon" href="./app-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="titlebar" id="window-titlebar" data-tauri-drag-region>
        <div class="brand" data-tauri-drag-region>
          <img class="brand-mark" src="./app-icon.png" alt="" data-tauri-drag-region />
          <span data-tauri-drag-region>Codex Bridge</span>
          <span class="brand-version" id="app-version" data-tauri-drag-region>v0.1.93</span>
        </div>
        <div class="titlebar-drag-region" data-tauri-drag-region aria-hidden="true"></div>
        <button class="text-button" id="open-settings" type="button">设置</button>
        <div class="window-controls" aria-label="窗口控制">
          <button class="window-control" id="window-minimize" type="button" title="最小化" aria-label="最小化">&#8722;</button>
          <button class="window-control" id="window-maximize" type="button" title="最大化" aria-label="最大化">&#9723;</button>
          <button class="window-control window-control-close" id="window-close" type="button" title="关闭" aria-label="关闭">&times;</button>
        </div>
      </header>

      <section class="view access-view" id="access-view" aria-labelledby="access-title">
        <div class="status-line" id="status-line" data-state="connecting">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="status-text">正在读取连接状态</span>
        </div>

        <h1 id="access-title">用手机继续</h1>
        <p class="supporting-copy">扫描二维码，在手机上访问这台电脑</p>

        <div class="qr-frame" id="qr-code" aria-label="手机访问二维码">
          <div class="qr-loading">正在生成二维码</div>
        </div>

        <div class="url-field">
          <output id="access-url" title="手机访问地址">读取访问地址中...</output>
          <button class="compact-button" id="copy-url" type="button" disabled>复制</button>
        </div>

        <button class="primary-button" id="open-web" type="button" disabled>在本机打开网页</button>
        <p class="access-note" id="access-note">通过固定 Web 服务安全连接</p>
        <p class="inline-error" id="access-error" role="alert"></p>
      </section>

      <section class="view settings-view" id="settings-view" aria-labelledby="settings-title" hidden>
        <div class="settings-heading">
          <button class="back-button" id="back-to-access" type="button" aria-label="返回扫码页面">&#8592;</button>
          <div>
            <h2 id="settings-title">连接设置</h2>
            <p>配置固定服务器和这台电脑的身份</p>
          </div>
        </div>

        <form id="form">
          <label>服务器地址<input id="serverUrl" type="url" required placeholder="https://codex-bridge.120.48.173.147.sslip.io" /></label>
          <label>网页地址<input id="webUrl" type="url" required placeholder="https://codex-bridge.120.48.173.147.sslip.io/" /></label>
          <div class="field-grid">
            <label>设备 ID<input id="deviceId" type="text" required readonly aria-readonly="true" /></label>
            <label>设备名称<input id="deviceName" type="text" required autocomplete="off" /></label>
          </div>
          <label>配对令牌<input id="token" type="password" autocomplete="new-password" placeholder="留空则继续使用已保存令牌" /></label>
          <label class="check-row"><input id="autoStart" type="checkbox" />登录 Windows 时自动启动</label>
          <section class="update-panel" aria-labelledby="update-heading">
            <div class="update-heading-row">
              <div>
                <h3 id="update-heading">软件更新</h3>
                <p>当前版本 <span id="update-current-version">--</span></p>
              </div>
              <button class="secondary-button update-check-button" id="check-update" type="button">检查更新</button>
            </div>
            <p class="update-status" id="update-status" aria-live="polite">尚未检查更新</p>
            <button class="primary-form-button update-open-button" id="open-update" type="button" hidden>打开下载页面</button>
            <p class="update-note">新版安装包会请求管理员权限并安装到系统程序目录。</p>
          </section>
          <p class="inline-error settings-error" id="settings-error" role="alert"></p>
          <div class="form-actions">
            <button class="secondary-button" type="button" id="cancel">关闭</button>
            <button class="primary-form-button" type="submit" id="save">保存并连接</button>
          </div>
        </form>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
